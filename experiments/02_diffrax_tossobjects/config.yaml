defaults:
  - _self_

quick: false
render: true
u0_start: -3.0
u0_end: -1.0
u0_resolution: 200
Nlength: 100
r_cost_weight: 0.0
qz0: 0.2  # Initial ball height
vy0: -0.1  # Initial horizontal velocity

xml:
  path: './experiments/xml'
  system: 'cube'
  overwrite:
    opt:
      timestep: 0.01
      iterations: 4
      ls_iterations: 10
      tolerance: 1e-8
      impratio: 1.0
      cfd_enable: False  # general switch for disabling any modification
      softjax_mode: 'hard'
      col_soft_enable: False
      scan_loop: True  # Use jax.lax.scan instead of while_loop for differentiable solver
      cfd_solimp: [0.0, 0.01, 0.05, 1.0, 2.0]

diffrax:
  solver: 'Tsit5'  # Euler, Tsit5
  stepsize_controller: 'PID'  # Constant, PID
  pid_atol: 1e-4
  pid_rtol: 1e-4
  max_ode_steps: 4096
  exact_quat_integration: true
  recursive_ncheckpoints: 256
  adjoint: 'RecursiveCheckpoint'