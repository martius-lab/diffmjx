defaults:
  - _self_

quick: false
render: true
mode: 'analyze'  # 'train', 'analyze'

general:
  camera: 'centric_angle'  # 'world', 'birdseye'
  u0: 0.0
  Nlength: 300
  r_cost_weight: 0.0
  qx0: -0.375
  qx1: -0.2

train:
  max_iter: 30
  start_learning_rate: 1e-1
  tol: 1e-6

analyze:
  u0_min: -5.0
  u0_max: 5.0
  u0_resolution: 200

xml:
  path: './experiments/xml'
  system: 'billiard'
  overwrite:
    opt:
      timestep: 0.01
      iterations: 2
      ls_iterations: 10
      tolerance: 1e-8
      impratio: 1.0
      cfd_enable: True # general switch for disabling any modification.
      col_soft_enable: False
      softjax_mode: 'smooth' # 'c1', 'c2', 'c4', 'smooth' - Mode for soft surrogates in collision detection.
      cfd_solimp: [0.0, 0.01, 0.1, 1.0, 2.0] # (d_0​, d_{width}​, width, midpoint, power)
      scan_loop: True

diffrax:
  solver: 'Tsit5'
  stepsize_controller: 'PID'
  pid_atol: 1e-6
  pid_rtol: 1e-6
  max_ode_steps: 4096
  exact_quat_integration: true
  adjoint: 'RecursiveCheckpoint'
  recursive_ncheckpoints: null
