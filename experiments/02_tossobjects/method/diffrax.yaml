# @package _global_
# Diffrax adaptive integration, hard collision detection
xml:
  overwrite:
    opt:
      softjax_mode: 'hard'
      col_soft_enable: False

diffrax:
  solver: 'Tsit5'
  stepsize_controller: 'PID'
  pid_atol: 1e-8
  pid_rtol: 1e-8
  max_ode_steps: 4096
  exact_quat_integration: true
  recursive_ncheckpoints: 256
  adjoint: 'RecursiveCheckpoint'
