defaults:
  - method: diffrax_soft
  - _self_

quick: false
render: true
u0_start: -3.0
u0_end: -1.0
u0_resolution: 200
simulation_time: 1.0  # Total simulation time
r_cost_weight: 0.0
qz0: 0.2  # Initial ball height
vy0: -0.1  # Initial horizontal velocity

xml:
  path: './experiments/xml'
  system: 'cube' # 'cube', 'ball', 'cylinder', 'capsule', 'ellipsoid'
  overwrite:
    opt:
      timestep: 0.01  # Simulation timestep (adaptive integrator will use smaller steps if needed)
      iterations: 4
      ls_iterations: 10
      tolerance: 1e-8
      impratio: 1.0
      cfd_enable: False
      scan_loop: True  # Use jax.lax.scan instead of while_loop for differentiable solver
      cfd_solimp: [0.0, 0.01, 0.05, 1.0, 2.0]
