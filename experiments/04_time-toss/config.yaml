      opt:
        timestep: 0.0003
    mjx_euler_1e-4_timestep:
      integrator: 'MJX'
      opt:
        timestep: 0.0001
    mjx_euler_3e-5_timestep:
      integrator: 'MJX'
      opt:
        timestep: 0.00003
    mjx_euler_1e-5_timestep:
      integrator: 'MJX'
      opt:
        timestep: 0.00001

    # --- MJX native: RK4 ---
    mjx_rk4_1e-1_timestep:
      integrator: 'MJX'
      opt:
        timestep: 0.1
    mjx_rk4_3e-2_timestep:
      integrator: 'MJX'
      opt:
        timestep: 0.03
    mjx_rk4_1e-2_timestep:
      integrator: 'MJX'
      opt:
        timestep: 0.01
    mjx_rk4_3e-3_timestep:
      integrator: 'MJX'
      opt:
        timestep: 0.003
    mjx_rk4_1e-3_timestep:
      integrator: 'MJX'
      opt:
        timestep: 0.001
    mjx_rk4_3e-4_timestep:
      integrator: 'MJX'
      opt:
        timestep: 0.0003
    mjx_rk4_1e-4_timestep:
      integrator: 'MJX'
      opt:
        timestep: 0.0001

    # --- MJX native: Implicit ---
    mjx_implicit_1e-2_timestep:
      integrator: 'MJX'
      opt:
        timestep: 0.01
    mjx_implicit_3e-3_timestep:
