    # --- Diffrax Euler constant step ---
    dfx_euler_1e3_steps:
      opt:
        timestep: 0.001
      diffrax:
        solver: 'Euler'
        stepsize_controller: 'Constant'
        max_ode_steps: null
        exact_quat_integration: true
        recursive_ncheckpoints: null
