defaults:
  - _self_

quick: false
render: true
u0s: [-2.0]  # Initial velocity of object.
systems: ['cube']
force_overwrite: True  # Overwrite results and logs if they already exist.

analyze:
  camera: track
  dt: 1.0
  r_cost_weight: 0.0
  initial_conditions:
    qz0: 0.2
    vy0: -0.1

xml:
  path: './experiments/xml'
  overwrite:
    opt:
      timestep: 0.01
      iterations: 4
      ls_iterations: 10
      tolerance: 1e-8
      impratio: 1.0

      col_soft_enable: True
      col_softness: 0.1
      softjax_mode: 'smooth'  # 'c1', 'c2', 'c4', 'smooth'
      cfd_enable: False
      cfd_solimp: [0.0, 0.01, 0.05, 1.0, 2.0]
      scan_loop: True  # Use scan in contact solver.

  overwrite_settings:
    # Backsolve computes accurate gradients but is very slow, 
    # used as ground truth for gradient error analysis.
    dfx_tsit5backsolve_1e-10_tol:
      diffrax:
        solver: 'Tsit5'
        stepsize_controller: 'PID'
        max_ode_steps: 10000
        exact_quat_integration: false
        pid_atol: 1e-10
        pid_rtol: 1e-10
        adjoint: 'Backsolve'
    # --- Diffrax adaptive: Tsit5 + PID at varying tolerances ---
    dfx_tsit5_1e-12_tol:
      diffrax:
        solver: 'Tsit5'
        stepsize_controller: 'PID'
        max_ode_steps: 10000
        exact_quat_integration: true
        recursive_ncheckpoints: null
        pid_atol: 1e-12
        pid_rtol: 1e-12
        adjoint: 'RecursiveCheckpoint'
    dfx_tsit5_1e-10_tol:
      diffrax:
        solver: 'Tsit5'
        stepsize_controller: 'PID'
        max_ode_steps: 10000
        exact_quat_integration: true
        recursive_ncheckpoints: null
        pid_atol: 1e-10
        pid_rtol: 1e-10
        adjoint: 'RecursiveCheckpoint'
    dfx_tsit5_1e-7_tol:
      diffrax:
        solver: 'Tsit5'
        stepsize_controller: 'PID'
        max_ode_steps: 10000
        exact_quat_integration: true
        recursive_ncheckpoints: null
        pid_atol: 1e-7
        pid_rtol: 1e-7
        adjoint: 'RecursiveCheckpoint'
    dfx_tsit5_1e-5_tol:
      diffrax:
        solver: 'Tsit5'
        stepsize_controller: 'PID'
        max_ode_steps: 10000
        exact_quat_integration: true
        recursive_ncheckpoints: null
        pid_atol: 1e-5
        pid_rtol: 1e-5
        adjoint: 'RecursiveCheckpoint'
    dfx_tsit5_1e-4_tol:
      diffrax:
        solver: 'Tsit5'
        stepsize_controller: 'PID'
        max_ode_steps: 10000
        exact_quat_integration: true
        recursive_ncheckpoints: null
        pid_atol: 1e-4
        pid_rtol: 1e-4
        adjoint: 'RecursiveCheckpoint'

    # --- Diffrax adaptive: Dopri8 ---
    dfx_dopri8_1e-10_tol:
      diffrax:
        solver: 'Dopri8'
        stepsize_controller: 'PID'
        max_ode_steps: 10000
        exact_quat_integration: true
        recursive_ncheckpoints: null
        pid_atol: 1e-10
