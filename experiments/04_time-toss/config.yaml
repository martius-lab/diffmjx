        timestep: 0.0003
      diffrax:
        use_mjx: True
        solver: 'Euler'
    mjx_euler_1e-4_timestep:
      opt:
        timestep: 0.0001
      diffrax:
        use_mjx: True
        solver: 'Euler'
    mjx_euler_3e-5_timestep:
