defaults:
  - _self_

quick: false
render: true
force_overwrite: True

analyze:
  dt: 0.1 # 1.0
  camera: 'track'
  num_spheres: [10]
  num_batch: [1, 10, 100, 1000]
  zmin: 0.1
  zmax: 0.3
  u0: -1.0
  r_cost_weight: 0.0

xml:
  overwrite:
    opt:
      timestep: 0.01
      iterations: 2
      ls_iterations: 10
      tolerance: 1e-8
      impratio: 1.0
      col_soft_enable: False
      cfd_enable: False
      cfd_solimp: [0.0, 0.01, 0.05, 1.0, 2.0]
      scan_loop: True

diffrax:
  solver: 'Tsit5'
  stepsize_controller: 'PID'
  max_ode_steps: 1024
  exact_quat_integration: true
  recursive_ncheckpoints: 256
  pid_atol: 1e-5
  pid_rtol: 1e-5
  adjoint: 'RecursiveCheckpoint'
